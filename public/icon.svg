<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Saheed Oladele monogram">
  <title>Saheed Oladele</title>
  <style>
    .ring, .letters { fill: #3a382f; }
    .ring { fill: none; stroke: #3a382f; }
    @media (prefers-color-scheme: dark) {
      .ring { stroke: #f5efe1; }
      .letters { fill: #f5efe1; }
    }
  </style>
  <circle class="ring" cx="32" cy="32" r="29.4" stroke-width="2.4" opacity="0.92"/>
  <text class="letters" x="32" y="42" text-anchor="middle" font-family="Newsreader, Georgia, 'Times New Roman', serif" font-size="30" font-weight="500" letter-spacing="-2.4">SO</text>
  <circle cx="49" cy="45" r="3.4" fill="#9c5a3c"/>
</svg>
